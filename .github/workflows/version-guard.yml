name: Version Guard

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout azd-rest
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: Download dependencies
        env:
          GOWORK: off
        run: go mod download

      - name: Run azd-core version guard
        env:
          GOWORK: off
        run: go test ./src/internal/azdcore/...
