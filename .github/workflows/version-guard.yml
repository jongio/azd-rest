name: Version Guard

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout azd-rest
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"

      - name: Download dependencies
        env:
          GOWORK: off
        run: go mod download

      - name: Run azd-core version guard
        env:
          GOWORK: off
        run: go test ./src/internal/azdcore/...
