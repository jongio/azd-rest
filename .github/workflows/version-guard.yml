name: Version Guard

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout azd-rest
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.1"

      - name: Download dependencies
        env:
          GOWORK: off
        run: go mod download

      - name: Run azd-core version guard
        env:
          GOWORK: off
        run: go test ./src/internal/azdcore/...
