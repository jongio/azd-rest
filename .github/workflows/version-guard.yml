name: Version Guard

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout azd-rest
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.4"

      - name: Download dependencies
        env:
          GOWORK: off
        run: go mod download

      - name: Run azd-core version guard
        env:
          GOWORK: off
        run: go test ./src/internal/azdcore/...
